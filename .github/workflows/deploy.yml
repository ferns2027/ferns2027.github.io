name: Build and Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RSPM: https://packagemanager.posit.co/cran/latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"

      - name: Restore R dependencies from renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Render multilingual website
        run: |
          owner="${GITHUB_REPOSITORY_OWNER}"
          repo_name="${GITHUB_REPOSITORY#*/}"
          # For user/org sites (repo name == <owner>.github.io),
          # the site lives at the root with no subpath.
          if [ "${repo_name}" = "${owner}.github.io" ]; then
            export BABELQUARTO_CI_URL="https://${owner}.github.io"
          else
            export BABELQUARTO_CI_URL="https://${owner}.github.io/${repo_name}"
          fi
          Rscript scripts/render_site.R

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
